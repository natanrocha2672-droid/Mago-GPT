app = "mago-gpt-wpp-scheduler"
primary_region = "gru"

[build]

[env]
  NODE_ENV = "production"
  DATA_DIR = "/data"
  TZ = "America/Sao_Paulo"
  AUTO_START = "true"

[mounts]
  source = "wpp_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
